# CARL PPO @ 7B. Same as 3B except scale + critic head hidden dim 3584.
actor_model: Qwen/Qwen2.5-7B-Instruct
critic_ckpt: outputs/critic_warmup/best_7b.pt
rollout_batch_prompts: 256
n_samples_per_prompt: 5
ppo_mini_batch: 64
ppo_epochs: 4
eps_clip: 0.2
gae_lambda: 0.0
gamma: 1.0
vf_coef: 0.5
ent_coef: 0.001
kl_coef: 0.001
max_segments: 15
invoke_max_tokens: 512
assimilate_max_tokens: 256
synthesize_max_tokens: 512
actor_lr: 1.0e-6
critic_value_head_lr: 5.0e-6
critic_backbone_lr: 5.0e-7
grad_clip: 1.0
num_steps: 500
eval_every: 25
out_dir: outputs/carl_7b
seed: 1
