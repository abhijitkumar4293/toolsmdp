# CARL PPO @ 3B. Used by scripts/05_train_carl_ppo.py.
actor_model: Qwen/Qwen2.5-3B-Instruct
critic_ckpt: outputs/critic_warmup/best.pt
rollout_batch_prompts: 256
n_samples_per_prompt: 5
ppo_mini_batch: 64
ppo_epochs: 4
eps_clip: 0.2
gae_lambda: 0.0          # one-step TD (paper Section 3.2 / Appendix A)
gamma: 1.0
vf_coef: 0.5
ent_coef: 0.001
kl_coef: 0.001
max_segments: 15
invoke_max_tokens: 512
assimilate_max_tokens: 256
synthesize_max_tokens: 512
actor_lr: 1.0e-6
critic_value_head_lr: 5.0e-6
critic_backbone_lr: 5.0e-7
grad_clip: 1.0
num_steps: 500
eval_every: 25
out_dir: outputs/carl_3b
seed: 1
